cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://google.com
file:
  upload-dir: /application/output
security:
  jwt:
    token:
      secret-key: 53cr37
      expire-length: 3600000
server:
    port: 8888
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB # armazenamento em memória, a partir disso gravará em disco
      max-file-size: 500MB
      max-request-size: 215MB
  spring-doc:
    path-to-match:
      - /api/**/v1/**
      - /auth/**
    swagger-ui:
      use-root-path: true
