cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://google.com
security:
  jwt:
    token:
      secret-key: 53cr37
      expire-length: 3600000
server:
    port: 8888
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  spring-doc:
    path-to-match:
      - /api/**/v1/**
      - /auth/**
    swagger-ui:
      use-root-path: true
